<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Campus API</title>
    <style>
        body {
        
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            opacity: 0.9;
        }

        .btn {
            margin-top: 25px;
            display: inline-block;
            padding: 12px 25px;
            font-size: 16px;
            color: #2a5298;
            background: white;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #f1f1f1;
        }

        .footer {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Smart Campus API</h1>

    <p>Sensor & Room Management System</p>
    <p>Built using JAX-RS (Jersey)</p>

    <a href="api/v1" class="btn">Go to API Discovery</a>

    <div class="footer">
        <p>Version: v1</p>
        <p>Admin: admin@university.com</p>
    </div>
</div>

</body>
</html>
